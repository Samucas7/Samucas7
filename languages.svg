<svg width="600" height="130" viewBox="0 0 600 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #161b22; rx: 12; }
      .card-bg { fill: #0d1117; }
      .title { font-family: 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #e6edf3; }
      .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #8b949e; }
      .flag { font-family: 'Segoe UI Emoji', Arial, sans-serif; font-size: 28px; }
    </style>
  </defs>

  <rect width="600" height="130" rx="12" fill="#161b22"/>

  <!-- PT card -->
  <rect x="10" y="10" width="130" height="110" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="75" y="52" text-anchor="middle" class="flag">🇵🇹</text>
  <text x="75" y="72" text-anchor="middle" class="title">Portuguese</text>
  <text x="75" y="86" text-anchor="middle" class="label">NATIVE</text>
  <rect x="22" y="92" width="106" height="4" rx="2" fill="#21262d"/>
  <rect x="22" y="92" width="106" height="4" rx="2" fill="#7c3aed"/>

  <!-- EN card -->
  <rect x="152" y="10" width="130" height="110" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="217" y="52" text-anchor="middle" class="flag">🇬🇧</text>
  <text x="217" y="72" text-anchor="middle" class="title">English</text>
  <text x="217" y="86" text-anchor="middle" class="label">ADVANCED</text>
  <rect x="164" y="92" width="106" height="4" rx="2" fill="#21262d"/>
  <rect x="164" y="92" width="85" height="4" rx="2" fill="#06b6d4"/>

  <!-- DE card -->
  <rect x="294" y="10" width="130" height="110" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="359" y="52" text-anchor="middle" class="flag">🇩🇪</text>
  <text x="359" y="72" text-anchor="middle" class="title">German</text>
  <text x="359" y="86" text-anchor="middle" class="label">INTERMEDIATE</text>
  <rect x="306" y="92" width="106" height="4" rx="2" fill="#21262d"/>
  <rect x="306" y="92" width="45" height="4" rx="2" fill="#f59e0b"/>

  <!-- FR card -->
  <rect x="436" y="10" width="154" height="110" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="513" y="52" text-anchor="middle" class="flag">🇫🇷</text>
  <text x="513" y="72" text-anchor="middle" class="title">French</text>
  <text x="513" y="86" text-anchor="middle" class="label">BASIC</text>
  <rect x="448" y="92" width="130" height="4" rx="2" fill="#21262d"/>
  <rect x="448" y="92" width="26" height="4" rx="2" fill="#10b981"/>
</svg>
